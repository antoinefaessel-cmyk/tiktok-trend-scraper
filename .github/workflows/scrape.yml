name: Scrape TikTok Trends

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd scripts
          npm install playwright
          npx playwright install chromium

      - name: Run scraper
        run: node scripts/scrape.js

      - name: Push data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update trending data"
          file_pattern: 'data/trending.json'
